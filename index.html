<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>واجهة احترافية</title>

<!-- Font Awesome الصحيح -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(145deg, #0f2027, #203a43, #2c5364);
  overflow: hidden;
  display: flex;
  flex-direction: column;
  height: 100vh;
}

#mainFrame {
  width: 100%;
  flex: 1;
  border: none;
}

/* navbar */
.navbar {
  width: 100%;
  height: 45px;
  background: linear-gradient(to top,
    rgba(2, 84, 126, 0.3),
    rgba(186, 230, 253, 0.4),
    rgba(255, 255, 255, 0.2)
  );
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  display: flex;
  justify-content: space-around;
  align-items: center;
  border-top: 2px solid rgba(255, 255, 255, 0.6);
  box-shadow:
    inset 0 4px 8px -4px rgba(255, 255, 255, 0.8),
    inset 0 -4px 8px -4px rgba(2, 84, 126, 0.3),
    0 -5px 15px -3px rgba(14, 165, 233, 0.3);
  transform: perspective(600px) rotateX(1.5deg);
  border-radius: 25px 25px 0 0;
  position: relative;
  overflow: hidden;
}

/* icon container */
.icon {
  width: 34px;
  height: 34px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 50%;
  cursor: pointer;

  background: linear-gradient(145deg, rgba(255,255,255,0.25), rgba(0,0,0,0.25));
  box-shadow:
    inset 2px 2px 5px rgba(0,0,0,0.6),
    inset -2px -2px 5px rgba(255,255,255,0.15),
    0 2px 6px rgba(0,0,0,0.4);

  transition: 0.25s;
}

.icon i {
  color: #dffcff;
  font-size: 14px;
}

.icon:hover {
  transform: translateY(-2px) scale(1.05);
}

.icon.active {
  box-shadow:
    inset 3px 3px 6px rgba(0,0,0,0.7),
    0 0 12px rgba(0,234,255,0.5);
}

/* panels */
.panel {
  border: 3px solid;
border-image: linear-gradient(145deg, #00eaff, #3a8ba8, #ffffff) 1;
  position: fixed;
  top: 0;
  right: -100%;
  width: 90%;
  height: 100%;
  background: #111;
  transition: 0.35s;
  z-index: 999;
}

.panel iframe {
  width: 100%;
  height: 100%;
  border: none;
}

.full {
  width: 100%;
}

.hideBtn {
  position: absolute;
  top: 10px;
  right: 10px;
  width: 30px;
  height: 30px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(0,0,3,0.5);
  color: red;
  cursor: pointer;
}
</style>
</head>

<body>

<iframe id="mainFrame" src="https://amanhsn55555-eng.github.io/Rom-amhah/"></iframe>

<div class="navbar">
  <div class="icon active" onclick="showPanel('panel1', this)">
    <i class="fa-solid fa-user-group"></i>
  </div>

  <div class="icon" onclick="showPanel('panel2', this)">
    <i class="fa-solid fa-comment-dots"></i>
  </div>

  <div class="icon" onclick="showPanel('panel3', this)">
    <i class="fa-solid fa-couch"></i>
  </div>

  <div class="icon" onclick="showPanel('panel4', this)">
    <i class="fa-solid fa-border-all"></i>
  </div>

  <div class="icon" onclick="showPanel('settings', this)">
    <i class="fa-solid fa-sliders"></i>
  </div>
</div>

<div id="panel1" class="panel">
  <div class="hideBtn" onclick="hidePanel('panel1')">×</div>
  <iframe src="https://amanhsn55555-eng.github.io/Users-chat/"></iframe>
</div>

<div id="panel2" class="panel">
  <div class="hideBtn" onclick="hidePanel('panel2')">×</div>
  <iframe src="https://amanhsn55555-eng.github.io/Msgtdy/"></iframe>
</div>

<div id="panel3" class="panel full">
  <div class="hideBtn" onclick="hidePanel('panel3')">×</div>
  <iframe src="https://amanhsn55555-eng.github.io/Grftodyyy/"></iframe>
</div>

<div id="panel4" class="panel">
  <div class="hideBtn" onclick="hidePanel('panel4')">×</div>
  <iframe src="https://amanhsn55555-eng.github.io/Gdar-chat/"></iframe>
</div>

<div id="settings" class="panel">
  <div class="hideBtn" onclick="hidePanel('settings')">×</div>
  <div style="padding:20px; color:white;">
    <p>ملفي الشخصي</p>
    <p>الإشعارات</p>
    <p>المتجر</p>
    <p>المحفظة</p>
  </div>
</div>

<script>
function showPanel(id, el) {
  document.querySelectorAll('.panel').forEach(p => p.style.right = "-100%");
  document.getElementById(id).style.right = "0";

  document.querySelectorAll('.icon').forEach(i => i.classList.remove('active'));
  el.classList.add('active');
}

function hidePanel(id) {
  document.getElementById(id).style.right = "-100%";
}
</script>

</body>
</html>
