<script>
function showPanel(id, el) {
  document.querySelectorAll('.panel').forEach(p => p.style.right = "-100%");
  document.getElementById(id).style.right = "0";

  document.querySelectorAll('.icon').forEach(i => i.classList.remove('active'));
  el.classList.add('active');
}

  // ==================== دالة عرض صفحة الأثرياء في iframe ====================
function showRichPanel() {
  // إخفاء جميع البانلات أولاً
  document.querySelectorAll('.panel').forEach(p => p.style.right = "-100%");
  
  // إنشاء نافذة جديدة لعرض صفحة الأثرياء
  let richWin = document.createElement("div");
  richWin.className = "panel";
  richWin.style.right = "0";
  
  // نفس تصميم البانلات الأخرى (iframe مباشر)
  richWin.innerHTML = `
    <div class="hideBtn" onclick="this.parentElement.remove()">×</div>
    <iframe src="https://amanhsn55555-eng.github.io/Athreaa-man-chat/"></iframe>
  `;
  
  document.body.appendChild(richWin);
}
function hidePanel(id) {
  document.getElementById(id).style.right = "-100%";
}

function openSub(link) {
  let win = document.createElement("div");
  win.className = "panel";
  win.style.right = "0";

  win.innerHTML = `
    <div class="hideBtn" onclick="this.parentElement.remove()">×</div>
    <iframe src="${link}"></iframe>
  `;

  document.body.appendChild(win);
}
</script>
